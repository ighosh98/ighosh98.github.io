<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{{ site.title | default: "Indraneel Ghosh" }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="author" content="{{ site.author.name }}">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link rel="stylesheet" href="{{ '/css/main.css' | relative_url }}">
  <link rel="icon" type="image/jpg" href="{{ '/images/profile.jpg' | relative_url }}">
  <style>
    /* Blog Styles */
    .post-list { list-style-type: none; padding: 0; margin-top: 2rem; }
    .post-list li { margin-bottom: 2rem; border-bottom: 1px solid #eeeeee; padding-bottom: 1.5rem; }
    @media (prefers-color-scheme: dark) { .post-list li { border-bottom-color: #2c2c2c; } }
    .post-list h3 { margin-top: 0; margin-bottom: 0.5rem; }
    .post-list .post-meta { font-size: 0.85rem; color: #999999; margin-bottom: 1rem; display: block; }

    .post-header { margin-bottom: 2rem; border-bottom: 1px solid #eeeeee; padding-bottom: 1.5rem; }
    @media (prefers-color-scheme: dark) { .post-header { border-bottom-color: #2c2c2c; } }
    .post-meta { font-size: 0.85rem; color: #999999; }
    .post-content { line-height: 1.8; font-size: 1.05rem; }
    .back-link { display: inline-block; margin-top: 3rem; }
  </style>
</head>
<body>

  <div class="wrapper">
    
    <!-- Left Navigation Sidebar -->
    <header class="sidebar">
      <div>
        <h1><a href="{{ '/' | relative_url }}#top">{{ site.author.name }}</a></h1>
        <p class="subtitle">{{ site.description }}<br>Prev- Google, Amazon</p>
        
        <nav class="sidebar-nav">
          <ul>
            <li><a href="{{ '/' | relative_url }}#about">Profile</a></li>
            <li><a href="{{ '/' | relative_url }}#experience">Experience</a></li>
            <li><a href="{{ '/' | relative_url }}#education">Education</a></li>
            <li><a href="{{ '/blog.html' | relative_url }}">Blog</a></li>
          </ul>
        </nav>
      </div>
      
      <div>
        <div class="social-links">
          <a href="{{ site.social_links[0].user_url }}" target="_blank" aria-label="GitHub">
            <svg viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
          </a>
          <a href="{{ site.social_links[1].user_url }}" target="_blank" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
          </a>
          <a href="mailto:{{ site.author.email }}" aria-label="Email">
            <svg viewBox="0 0 24 24"><path d="M0 3v18h24v-18h-24zm21.518 2l-9.518 7.713-9.518-7.713h19.036zm-19.518 14v-11.817l10 8.104 10-8.104v11.817h-20z"/></svg>
          </a>
        </div>
        <p class="copyright">&copy; 2026 {{ site.author.name }}</p>
      </div>
    </header>

    <!-- Right Main Content -->
    <main class="content" id="top">
      {{ content }}
    </main>
  </div>

</body>
</html>
